font=ShureTechMono Nerd Font:size=12
dpi-aware=no
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e

prompt=Search:  
icons-enabled=no
show-actions=yes

lines=1
width=50
horizontal-pad=20
vertical-pad=20
inner-pad=5
line-height=20
letter-spacing=0

image-size-ratio=0.2

layer = top
exit-on-keyboard-focus-loss = yes

[border]
width=2
radius=5

[colors]
background=1e1e2edd
text=cdd6f4ff
match=f38ba8ff
selection=585b70ff
selection-match=f38ba8ff
selection-text=cdd6f4ff
border=b4befeff
